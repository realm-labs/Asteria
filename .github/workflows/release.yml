name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply when version is empty."
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Explicit release version, for example 0.1.0. Leave empty to auto-bump."
        required: false
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Prepare release version
        id: release
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git fetch --force --tags

          VERSION_NAME="$(echo "${INPUT_VERSION#v}" | xargs)"
          BUMP="${INPUT_BUMP:-patch}"

          if [[ -z "${VERSION_NAME}" ]]; then
            LATEST_VERSION="$(
              git tag -l 'v*' \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sed -E 's/^v//' \
                | sort -V \
                | tail -n 1 \
                || true
            )"

            if [[ -z "${LATEST_VERSION}" ]]; then
              LATEST_VERSION="0.0.0"
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_VERSION}"
            case "${BUMP}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
              *)
                echo "Unsupported bump: ${BUMP}" >&2
                exit 1
                ;;
            esac

            VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
          fi

          TAG_NAME="v${VERSION_NAME}"

          if [[ ! "${VERSION_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${VERSION_NAME}" >&2
            exit 1
          fi

          if [[ "${VERSION_NAME}" == *"-SNAPSHOT" ]]; then
            echo "Release version must not end with -SNAPSHOT: ${VERSION_NAME}" >&2
            exit 1
          fi

          CREATE_TAG="true"
          TAG_SHA="$(git rev-list -n 1 "${TAG_NAME}" 2>/dev/null || true)"
          if [[ -n "${TAG_SHA}" ]]; then
            if [[ "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
              echo "Release tag already exists on another commit: ${TAG_NAME}" >&2
              exit 1
            fi

            CREATE_TAG="false"
            echo "Release tag already exists on current commit and will be reused: ${TAG_NAME}"
          fi

          CENTRAL_POM_URL="https://repo1.maven.org/maven2/io/github/realm-labs/asteria/foundation-core/${VERSION_NAME}/foundation-core-${VERSION_NAME}.pom"
          if curl --silent --fail --location --head "${CENTRAL_POM_URL}" >/dev/null; then
            echo "Release version already exists on Maven Central: ${VERSION_NAME}" >&2
            exit 1
          fi

          {
            echo "version=${VERSION_NAME}"
            echo "tag=${TAG_NAME}"
            echo "create-tag=${CREATE_TAG}"
          } >> "${GITHUB_OUTPUT}"

          echo "Preparing release ${VERSION_NAME} (${TAG_NAME})"

      - name: Validate signing key
        env:
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${SIGNING_IN_MEMORY_KEY}" ]]; then
            echo "SIGNING_IN_MEMORY_KEY is empty." >&2
            exit 1
          fi

          if ! grep -q "BEGIN PGP PRIVATE KEY BLOCK" <<< "${SIGNING_IN_MEMORY_KEY}"; then
            echo "SIGNING_IN_MEMORY_KEY must contain an ASCII-armored private key." >&2
            exit 1
          fi

          KEY_FILE="$(mktemp)"
          printf '%s\n' "${SIGNING_IN_MEMORY_KEY}" > "${KEY_FILE}"
          gpg --batch --import "${KEY_FILE}" >/dev/null
          rm -f "${KEY_FILE}"

      - name: Verify
        run: |
          ./gradlew --no-daemon build detekt \
            -PVERSION_NAME="${{ steps.release.outputs.version }}"

      - name: Validate release GitHub token
        if: steps.release.outputs.create-tag == 'true'
        env:
          RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_GITHUB_TOKEN}" ]]; then
            echo "RELEASE_GITHUB_TOKEN is empty." >&2
            echo "Create a GitHub PAT with contents write permission and workflow permission, then add it as the RELEASE_GITHUB_TOKEN secret." >&2
            exit 1
          fi

      - name: Create release tag
        if: steps.release.outputs.create-tag == 'true'
        env:
          RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.version }}"
          git push "https://x-access-token:${RELEASE_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${{ steps.release.outputs.tag }}"

      - name: Publish
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon publishAndReleaseToMavenCentral \
            -PVERSION_NAME="${{ steps.release.outputs.version }}" \
            -PsignAllPublications=true
