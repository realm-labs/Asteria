syntax = "proto3";

package asteria.script;

option java_multiple_files = true;
option java_package = "io.github.realmlabs.asteria.script.protobuf";
option java_outer_classname = "AsteriaScriptProto";

message ScriptArtifact {
  string name = 1;
  string engine = 2;
  bytes body = 3;
  optional bytes extra = 4;
  optional string checksum = 5;
}

message ScriptTarget {
  oneof target {
    AllNodesTarget all_nodes = 1;
    RoleTarget role = 2;
    NodeTarget node = 3;
    ActorPathTarget actor_path = 4;
    EntityTarget entity = 5;
    SingletonTarget singleton = 6;
  }
}

message AllNodesTarget {
}

message RoleTarget {
  string role = 1;
}

message NodeTarget {
  repeated string addresses = 1;
}

message ActorPathTarget {
  repeated string paths = 1;
}

message EntityTarget {
  string kind = 1;
  repeated string ids = 2;
}

message SingletonTarget {
  string name = 1;
}

message ExecuteScriptCommand {
  string execution_id = 1;
  ScriptTarget target = 2;
  ScriptArtifact artifact = 3;
  ScriptExecutionMetadata metadata = 4;
}

message ScriptExecutionMetadata {
  optional string requester = 1;
  optional string reason = 2;
  map<string, string> attributes = 3;
  repeated ScriptResourceRef resources = 4;
}

message ScriptResourceRef {
  string name = 1;
  string uri = 2;
  optional string checksum = 3;
  optional string format = 4;
  optional int64 size_bytes = 5;
  map<string, string> attributes = 6;
}

message ExecuteNodeScript {
  ExecuteScriptCommand command = 1;
  optional string origin_node_address = 2;
}

message ExecuteActorScript {
  string execution_id = 1;
  ScriptArtifact artifact = 2;
  optional ScriptTarget target = 3;
  ScriptExecutionMetadata metadata = 4;
}

message ExecuteEntityActorScript {
  string id = 1;
  string execution_id = 2;
  ScriptArtifact artifact = 3;
  optional ScriptTarget target = 4;
  ScriptExecutionMetadata metadata = 5;
}

message ScriptExecutionResult {
  string execution_id = 1;
  bool success = 2;
  optional string target = 3;
  optional string error = 4;
  optional string node_address = 5;
  optional string actor_path = 6;
}
